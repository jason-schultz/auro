name: auro-be-ci

on:
  push:
    paths:
      - "auro_be/**"
      - ".github/workflows/auro-be-ci.yml"
  pull_request:
    paths:
      - "auro_be/**"
      - ".github/workflows/auro-be-ci.yml"

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    defaults:
      run:
        working-directory: auro_be

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "auro_be -> target"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features
