name: auro-fe-ci

on:
  push:
    paths:
      - "auro_fe/**"
      - ".github/workflows/auro-fe-ci.yml"
  pull_request:
    paths:
      - "auro_fe/**"
      - ".github/workflows/auro-fe-ci.yml"

jobs:
  frontend-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: auro_fe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Smoke tests
        run: bun test

  frontend-quality:
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: auro-fe-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    defaults:
      run:
        working-directory: auro_fe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Show toolchain
        run: |
          bun --version
          node --version

      - name: Unit tests
        run: bun test

      - name: View behavior tests
        run: bun run test:views

      - name: Build
        run: bun run build
